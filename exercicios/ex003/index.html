<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com imagens</title>
</head>
<body>
    <h1>Testando carga e imagens</h1>
    <p>Abaixo você vai ver uma imagem que está na mesma pasta</p>
    <img src="logohtml-200.png" alt="Logo HTML5">
    <p>Podemos também carregar imagens que estão em sub-pastas.</p>
    <img src="imagens/logocss3-200.png" alt="Logo CSS3">
    <!--Quando a imagem for interna, basta dar um ctrl+espaço dentro do caminho que os arquivos aparecerão, aí é só escolher.-->
    <p>Podemos também carregar imagens externas.</p>
    <img src="https://cdn.iconscout.com/icon/free/png-256/free-javascript-logo-icon-svg-download-png-1720087.png" alt="Logo JavaScript">
    <!--Quando a imagem estiver em um site externo, basta copiar o endereço da imagem e colar no caminho.-->
</body>
</html>
