<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        body {
            background-image: linear-gradient (to right, #7E4BC0, #E33B61, #FECD75);
        }
        /*O "to right" significa que o degradê é para a direita começando da primeira cor, você pode usar quantas quiser. Esse degradê foi extraido do símbolo do instagram, uma imagem do símbolo foi arrastada para dentro do site adobe color na área de extração de gradiente, lá ele disse qual os códigos da paleta de cores.*/
        /*to bottom = para baixo, to top = para cima, to right = para direita, to left = para esquerda, to botton right = para o canto inferior direito, to top left = para o canto superior esquerdo.*/ 
    </style>
</head>
<body>
    <h1>Testando Gradiente</h1>
</body>
</html>
