<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /* # = id
        . = class 
        : = pseudo-class 
        :: = pseudo-element 
        > = filho */
        
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkred;
        }
        /* O visited é como o texto se comporta após o link ser visitado. */
        a:hover {
            text-decoration: underline;
            color: black;
        }
        /* O hover é como o texto se comporta quando passa o mouse sobre ele. */
        a:active {
            color: yellow;
        }
        /* O active corresponde a quando o texto está ativado, como o texto se comporta durante o clique nele. */

        a::after {
            content: '  [Link]';
            text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }
        /* (::) representa um pseudo-elemento, o after depois do seletor indica o que vem após o texto. */

        a::before {
            content: '-->';
        }
        /* Before é o que vem antes. */
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo/" target="_blank">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
