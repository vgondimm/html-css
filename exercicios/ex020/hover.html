<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
           
        }

        div > p {
            display: none;
            /*O display none esconde o texto*/
            /*div > p significa que p é filho de div*/
        }

        div:hover > p {
            /*Basicamente "div:hover > p" diz o seguinte: "quando eu passar o mouse na div o p..." então nas propriedades a gente indica qual será a ação.*/
            display: block;
            /*O display block no hover faz o texto aparecer quando passa o mouse sobre o texto da tag pai*/
            color: white;
            background-color: red;
            width: 300px;
        }

        div:hover {
            color: red;
           
        }
    </style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>Passe o mouse sobre o texto abaixo</p>
    <div>
        Passe o mouse aqui
        <p>TEXTO ESCONDIDO...</p>
    </div>
    <p>Fim do exemplo</p>
</body>
</html>
